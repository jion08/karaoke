<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>노래방 자막 생성기 - 레트로 감성 3줄</title>
    <style>
        @font-face {
            font-family: 'DungGeunMo';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        body {
            margin: 0;
            padding: 0;
            /* 폰트 적용 */
            font-family: 'DungGeunMo', sans-serif; 
            overflow: hidden;
            background-color: #2c3e50;
            color: white;
            user-select: none;
        }

        /* 가사 입력 화면 */
        #input-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        textarea {
            width: 80%;
            max-width: 600px;
            height: 300px;
            padding: 15px;
            font-size: 16px;
            border-radius: 10px;
            border: none;
            resize: none;
            margin-bottom: 20px;
            font-family: 'Malgun Gothic', sans-serif;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            font-family: 'DungGeunMo', sans-serif;
            color: white;
            background-color: #e74c3c;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* --------------------------------------
           노래방 화면 (요청하신 스타일 적용 부분)
           -------------------------------------- */
        #karaoke-screen {
            display: none; 
            width: 100vw;
            height: 100vh;
            /* 배경색: 짤방 느낌의 하늘색 */
            background-color: #87CEEB; 
            position: relative;
        }
        
        /* 가사 전체 영역 */
        .lyrics-container {
            position: absolute;
            bottom: 10%;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 각 줄(Line)의 컨테이너 */
        .line-wrapper {
            margin-bottom: 20px; /* 수직 간격 좁힘 */
            height: 120px; /* 글자 크기에 맞춰 높임 */
            width: 95%; /* 전체적으로 왼쪽에 가깝게 하기 위해 너비 늘림 */
        }

        /* 계단식 레이아웃: 윗줄 왼쪽, 중간줄 중앙, 아랫줄 오른쪽 */
        /* 사용자의 "왼쪽으로 땅겨봐라" 요청 반영 */
        #wrapper1 { text-align: left; padding-left: 10px; } /* 왼쪽 끝에 가깝게 */
        #wrapper2 { text-align: center; } /* 중앙 */
        #wrapper3 { text-align: right; padding-right: 20px; } /* 오른쪽 */

        /* 글자 껍데기 디자인: 깔끔한 테두리 */
        .lyric-box {
            position: relative;
            display: inline-block; 
            font-size: 100px; /* 자막 크기 크게 */
            letter-spacing: 5px; /* 자간 넓게 */
            
            /* 이중 테두리 제거 후 text-shadow로 깔끔한 테두리 구현 */
            text-shadow: 4px 4px 0 #000, -4px -4px 0 #000, 4px -4px 0 #000, -4px 4px 0 #000;
        }

        /* 기본 대기 색상 (흰색) */
        .text-base {
            color: white; 
        }

        /* 색이 차오르는 부분 (짤방의 파란색 텍스트) */
        .text-fill {
            position: absolute;
            top: 0;
            left: 0;
            color: #5DA4FF; /* 시원한 라이트 블루 */
            width: 0%; 
            overflow: hidden;
            white-space: nowrap;
        }
        
        /* 현재 부르는 줄 통통 튀는 효과 */
        .active-line {
            transform: scale(1.05);
            transition: transform 0.2s;
        }
    </style>
</head>
<body>

    <div id="input-screen">
        <h2 style="font-family: 'DungGeunMo', sans-serif;">🎤 가사를 넣어주세요</h2>
        <textarea id="lyrics-input">정의당 심상정 거침없는 대개혁
노동이 당당한 새로운 대한민국 우리의 선
택은 5번 심상정
그래 심상정이야 내 삶을 바꾸는
정치교체 선택해요 이번에 용기 내봐요
흔들리지 않는 우리 선택 확실한 심상정이야</textarea>
        <button id="start-btn">시작하기</button>
    </div>

    <div id="karaoke-screen">
        <div class="lyrics-container">
            <div class="line-wrapper" id="wrapper1">
                <div class="lyric-box" id="line1">
                    <div class="text-base"></div>
                    <div class="text-fill"></div>
                </div>
            </div>
            <div class="line-wrapper" id="wrapper2">
                <div class="lyric-box" id="line2">
                    <div class="text-base"></div>
                    <div class="text-fill"></div>
                </div>
            </div>
            <div class="line-wrapper" id="wrapper3">
                <div class="lyric-box" id="line3">
                    <div class="text-base"></div>
                    <div class="text-fill"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 작동 로직은 이전과 동일하지만 3줄 순환 로직으로 확장되었습니다.
        let lyricsArray = [];
        let currentLyricIndex = 0;
        let activeLine = 1; // 1, 2, 3 순환
        
        // 사용자가 바꾼 속도 적용
        let isPressing = false;
        let currentSpeed = 0;
        let fillProgress = 0; 

        function setLineText(lineNum, text) {
            const base = document.querySelector(`#line${lineNum} .text-base`);
            const fill = document.querySelector(`#line${lineNum} .text-fill`);
            base.innerText = text;
            fill.innerText = text;
            fill.style.width = '0%'; 
        }

        document.getElementById('start-btn').addEventListener('click', function() {
            const rawText = document.getElementById('lyrics-input').value;
            lyricsArray = rawText.split('\n').filter(line => line.trim() !== "");

            if(lyricsArray.length === 0) return alert("가사를 입력해주세요!");

            document.getElementById('input-screen').style.display = 'none';
            document.getElementById('karaoke-screen').style.display = 'block';

            // 첫 세 줄 미리 세팅
            setLineText(1, lyricsArray[0] || "");
            setLineText(2, lyricsArray[1] || "");
            setLineText(3, lyricsArray[2] || "");
            
            document.getElementById('line1').classList.add('active-line');
        });

        document.addEventListener('keydown', function(e) {
            if(e.repeat) return; 

            // 사용자가 바꾼 속도 수치 적용 (0.2, 0.4, 0.7)
            if (e.key === '1') { isPressing = true; currentSpeed = 0.2; } 
            else if (e.key === '2') { isPressing = true; currentSpeed = 0.4; } 
            else if (e.key === '3') { isPressing = true; currentSpeed = 0.7; } 
            
            else if (e.key === 'Enter') {
                if (currentLyricIndex >= lyricsArray.length) return;

                currentLyricIndex++;
                
                // CSS 효과 제거
                document.getElementById(`line${activeLine}`).classList.remove('active-line');
                
                // 활성 줄 교체 및 새 가사 장전
                const inactiveLine = activeLine; // 방금 부른 줄
                activeLine = (activeLine % 3) + 1; // 다음 활성 줄 (1->2, 2->3, 3->1)
                
                // CSS 효과 추가
                document.getElementById(`line${activeLine}`).classList.add('active-line');
                fillProgress = 0; // 색칠 진행도 초기화

                // 방금 부른 줄에 다음 가사 장전 (현재 인덱스 + 활성 줄의 거리)
                // 3줄 순환이므로, 방금 부른 줄에 로드할 가사는 (currentLyricIndex + 2)번째 가사입니다.
                let nextLyricToLoad = lyricsArray[currentLyricIndex + 2] || "";
                setLineText(inactiveLine, nextLyricToLoad);
            }
        });

        document.addEventListener('keyup', function(e) {
            if (['1', '2', '3'].includes(e.key)) {
                isPressing = false;
            }
        });

        function animateFill() {
            if (isPressing && fillProgress < 100) {
                fillProgress += currentSpeed;
                if (fillProgress > 100) fillProgress = 100;

                const activeFillElement = document.querySelector(`#line${activeLine} .text-fill`);
                if (activeFillElement) {
                    activeFillElement.style.width = fillProgress + '%';
                }
            }
            requestAnimationFrame(animateFill); 
        }
        
        requestAnimationFrame(animateFill);
    </script>
</body>
</html>
