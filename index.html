<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>노래방 자막 생성기 - 레트로 감성</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            /* 폰트 적용 */
            font-family: 'Black Han Sans', 'Malgun Gothic', sans-serif; 
            overflow: hidden;
            background-color: #2c3e50;
            color: white;
            user-select: none;
        }

        /* 가사 입력 화면 */
        #input-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        textarea {
            width: 80%;
            max-width: 600px;
            height: 300px;
            padding: 15px;
            font-size: 16px;
            border-radius: 10px;
            border: none;
            resize: none;
            margin-bottom: 20px;
            font-family: 'Malgun Gothic', sans-serif;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            font-family: 'Black Han Sans', sans-serif;
            color: white;
            background-color: #e74c3c;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* --------------------------------------
           노래방 화면 (요청하신 스타일 적용 부분)
           -------------------------------------- */
        #karaoke-screen {
            display: none; 
            width: 100vw;
            height: 100vh;
            /* 배경색: 짤방 느낌의 하늘색 
               (나중에 프리미어 등에서 크로마키로 빼시려면 #00FF00 으로 바꾸시면 됩니다) */
            background-color: #87CEEB; 
            position: relative;
        }
        
        /* 가사 전체 영역 */
        .lyrics-container {
            position: absolute;
            bottom: 15%;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 각 줄(Line)의 컨테이너 */
        .line-wrapper {
            margin-bottom: 40px;
            height: 80px; 
            width: 90%;
            max-width: 1200px;
        }

        /* 핵심 레이아웃: 윗줄은 왼쪽, 아랫줄은 오른쪽으로 배치 */
        #wrapper1 { text-align: left; padding-left: 5%; }
        #wrapper2 { text-align: right; padding-right: 5%; }

        /* 글자 껍데기 디자인 */
        .lyric-box {
            position: relative;
            display: inline-block; 
            font-size: 70px; /* 글자 크기 큼직하게 */
            letter-spacing: 3px; /* 자간 살짝 넓게 */
            
            /* 두꺼운 검은 테두리와 그림자 */
            -webkit-text-stroke: 4px black;
            text-shadow: 4px 4px 0px rgba(0,0,0,1);
        }

        /* 기본 대기 색상 (흰색) */
        .text-base {
            color: white; 
        }

        /* 색이 차오르는 부분 (짤방의 파란색 텍스트) */
        .text-fill {
            position: absolute;
            top: 0;
            left: 0;
            color: #5DA4FF; /* 시원한 라이트 블루 */
            width: 0%; 
            overflow: hidden;
            white-space: nowrap;
        }
        
        /* 현재 부르는 줄 통통 튀는 효과 */
        .active-line {
            transform: scale(1.05);
            transition: transform 0.2s;
        }
    </style>
</head>
<body>

    <div id="input-screen">
        <h2 style="font-family: 'Black Han Sans', sans-serif;">🎤 가사를 넣어주세요</h2>
        <textarea id="lyrics-input">동해물과 백두산이
마르고 닳도록
하느님이 보우하사
우리나라 만세
무궁화 삼천리
화려강산
대한사람 대한으로
길이 보전하세</textarea>
        <button id="start-btn">시작하기</button>
    </div>

    <div id="karaoke-screen">
        <div class="lyrics-container">
            <div class="line-wrapper" id="wrapper1">
                <div class="lyric-box" id="line1">
                    <div class="text-base"></div>
                    <div class="text-fill"></div>
                </div>
            </div>
            <div class="line-wrapper" id="wrapper2">
                <div class="lyric-box" id="line2">
                    <div class="text-base"></div>
                    <div class="text-fill"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 작동 로직은 이전과 100% 동일합니다.
        let lyricsArray = [];
        let currentLyricIndex = 0;
        let activeLine = 1; 
        
        let isPressing = false;
        let currentSpeed = 0;
        let fillProgress = 0; 

        function setLineText(lineNum, text) {
            const base = document.querySelector(`#line${lineNum} .text-base`);
            const fill = document.querySelector(`#line${lineNum} .text-fill`);
            base.innerText = text;
            fill.innerText = text;
            fill.style.width = '0%'; 
        }

        document.getElementById('start-btn').addEventListener('click', function() {
            const rawText = document.getElementById('lyrics-input').value;
            lyricsArray = rawText.split('\n').filter(line => line.trim() !== "");

            if(lyricsArray.length === 0) return alert("가사를 입력해주세요!");

            document.getElementById('input-screen').style.display = 'none';
            document.getElementById('karaoke-screen').style.display = 'block';

            setLineText(1, lyricsArray[0] || "");
            setLineText(2, lyricsArray[1] || "");
            
            document.getElementById('line1').classList.add('active-line');
        });

        document.addEventListener('keydown', function(e) {
            if(e.repeat) return; 

            if (e.key === '1') { isPressing = true; currentSpeed = 0.2; } 
            else if (e.key === '2') { isPressing = true; currentSpeed = 0.4; } 
            else if (e.key === '3') { isPressing = true; currentSpeed = 0.8; } 
            
            else if (e.key === 'Enter') {
                if (currentLyricIndex >= lyricsArray.length) return;

                currentLyricIndex++;
                activeLine = (activeLine === 1) ? 2 : 1;
                fillProgress = 0; 

                document.getElementById('line1').classList.remove('active-line');
                document.getElementById('line2').classList.remove('active-line');
                document.getElementById(`line${activeLine}`).classList.add('active-line');

                let inactiveLine = (activeLine === 1) ? 2 : 1;
                let nextLyricToLoad = lyricsArray[currentLyricIndex + 1] || "";
                setLineText(inactiveLine, nextLyricToLoad);
            }
        });

        document.addEventListener('keyup', function(e) {
            if (['1', '2', '3'].includes(e.key)) {
                isPressing = false;
            }
        });

        function animateFill() {
            if (isPressing && fillProgress < 100) {
                fillProgress += currentSpeed;
                if (fillProgress > 100) fillProgress = 100;

                const activeFillElement = document.querySelector(`#line${activeLine} .text-fill`);
                if (activeFillElement) {
                    activeFillElement.style.width = fillProgress + '%';
                }
            }
            requestAnimationFrame(animateFill); 
        }
        
        requestAnimationFrame(animateFill);
    </script>
</body>
</html>
