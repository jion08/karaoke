<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>노래방 자막 생성기</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', sans-serif;
            overflow: hidden;
            background-color: #2c3e50;
            color: white;
            user-select: none; /* 글자 드래그 방지 */
        }

        /* 입력 화면 */
        #input-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        textarea {
            width: 80%;
            max-width: 600px;
            height: 300px;
            padding: 15px;
            font-size: 16px;
            border-radius: 10px;
            border: none;
            resize: none;
            margin-bottom: 20px;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #e74c3c;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* 크로마키 화면 */
        #karaoke-screen {
            display: none; 
            width: 100vw;
            height: 100vh;
            background-color: #00FF00; /* 크로마키 그린 */
            position: relative;
        }
        
        /* 가사 전체 영역 */
        .lyrics-container {
            position: absolute;
            bottom: 50px;
            width: 100%;
            text-align: center;
        }

        /* 각 줄(Line)의 컨테이너 */
        .line-wrapper {
            margin-bottom: 20px;
            height: 60px; /* 높이 고정으로 흔들림 방지 */
        }

        /* 텍스트 겹치기를 위한 핵심 스타일 */
        .lyric-box {
            position: relative;
            display: inline-block; /* 글자 길이에 맞춰 박스 크기 조절 */
            font-size: 50px;
            font-weight: 900;
            -webkit-text-stroke: 2px black;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .text-base {
            color: white; /* 기본 대기 색상 */
        }

        .text-fill {
            position: absolute;
            top: 0;
            left: 0;
            color: #ff00ff; /* 채워지는 색상 (마젠타) */
            width: 0%; /* 처음엔 0% (안 보임) */
            overflow: hidden;
            white-space: nowrap;
        }
        
        /* 현재 부르는 줄 표시용 애니메이션 (선택 사항) */
        .active-line {
            transform: scale(1.05);
            transition: transform 0.2s;
        }
    </style>
</head>
<body>

    <div id="input-screen">
        <h2>🎤 가사를 넣어주세요</h2>
        <textarea id="lyrics-input">동해물과 백두산이
마르고 닳도록
하느님이 보우하사
우리나라 만세
무궁화 삼천리
화려강산
대한사람 대한으로
길이 보전하세</textarea>
        <button id="start-btn">시작하기</button>
    </div>

    <div id="karaoke-screen">
        <div class="lyrics-container">
            <div class="line-wrapper">
                <div class="lyric-box" id="line1">
                    <div class="text-base"></div>
                    <div class="text-fill"></div>
                </div>
            </div>
            <div class="line-wrapper">
                <div class="lyric-box" id="line2">
                    <div class="text-base"></div>
                    <div class="text-fill"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let lyricsArray = [];
        let currentLyricIndex = 0; // 현재 부르고 있는 가사 순서
        let activeLine = 1; // 1이면 윗줄, 2면 아랫줄이 현재 활성 상태
        
        // 키보드 컨트롤 변수
        let isPressing = false;
        let currentSpeed = 0;
        let fillProgress = 0; // 0 ~ 100%

        // 가사 텍스트를 HTML에 넣어주는 함수
        function setLineText(lineNum, text) {
            const base = document.querySelector(`#line${lineNum} .text-base`);
            const fill = document.querySelector(`#line${lineNum} .text-fill`);
            base.innerText = text;
            fill.innerText = text;
            fill.style.width = '0%'; // 새 가사 로드 시 색칠 0%로 초기화
        }

        // 시작 버튼 로직
        document.getElementById('start-btn').addEventListener('click', function() {
            const rawText = document.getElementById('lyrics-input').value;
            lyricsArray = rawText.split('\n').filter(line => line.trim() !== "");

            if(lyricsArray.length === 0) return alert("가사를 입력해주세요!");

            document.getElementById('input-screen').style.display = 'none';
            document.getElementById('karaoke-screen').style.display = 'block';

            // 첫 두 줄 미리 세팅
            setLineText(1, lyricsArray[0] || "");
            setLineText(2, lyricsArray[1] || "");
            
            document.getElementById('line1').classList.add('active-line');
        });

        // 1. 키보드 누를 때 (keydown)
        document.addEventListener('keydown', function(e) {
            // 이미 누르고 있는 상태면 무시 (연속 입력 방지)
            if(e.repeat) return; 

            if (e.key === '1') { isPressing = true; currentSpeed = 0.2; } // 느림
            else if (e.key === '2') { isPressing = true; currentSpeed = 0.5; } // 중간
            else if (e.key === '3') { isPressing = true; currentSpeed = 1.0; } // 빠름
            
            // 엔터키 로직 (다음 가사로 교차)
            else if (e.key === 'Enter') {
                if (currentLyricIndex >= lyricsArray.length) return;

                // 1. 인덱스 증가 및 활성 줄 교체 (1->2, 2->1)
                currentLyricIndex++;
                activeLine = (activeLine === 1) ? 2 : 1;
                fillProgress = 0; // 색칠 진행도 초기화

                // 2. CSS 효과 업데이트
                document.getElementById('line1').classList.remove('active-line');
                document.getElementById('line2').classList.remove('active-line');
                document.getElementById(`line${activeLine}`).classList.add('active-line');

                // 3. 방금 부른 줄(이제 대기할 줄)에 '다음 다음' 가사 장전
                let inactiveLine = (activeLine === 1) ? 2 : 1;
                let nextLyricToLoad = lyricsArray[currentLyricIndex + 1] || "";
                setLineText(inactiveLine, nextLyricToLoad);
            }
        });

        // 2. 키보드 뗄 때 (keyup)
        document.addEventListener('keyup', function(e) {
            if (['1', '2', '3'].includes(e.key)) {
                isPressing = false;
            }
        });

        // 3. 부드러운 애니메이션 루프 (매 프레임마다 실행됨)
        function animateFill() {
            if (isPressing && fillProgress < 100) {
                fillProgress += currentSpeed;
                if (fillProgress > 100) fillProgress = 100;

                // 현재 활성화된 줄의 색상 게이지 올리기
                const activeFillElement = document.querySelector(`#line${activeLine} .text-fill`);
                if (activeFillElement) {
                    activeFillElement.style.width = fillProgress + '%';
                }
            }
            requestAnimationFrame(animateFill); // 브라우저 주사율에 맞춰 무한 반복
        }
        
        // 애니메이션 시작
        requestAnimationFrame(animateFill);

    </script>
</body>
</html>
