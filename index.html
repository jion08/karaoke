<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>노래방 자막 생성기 - 2줄 근본 시스템 (폰트 500)</title>
    <style>
        /* 사용자 요청 에이투지체(A2z) 폰트 로드 */
        @font-face { font-family: 'A2z'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-6@1.0/에이투지체-1Thin.woff2') format('woff2'); font-weight: 100; font-display: swap; }
        @font-face { font-family: 'A2z'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-6@1.0/에이투지체-2ExtraLight.woff2') format('woff2'); font-weight: 200; font-display: swap; }
        @font-face { font-family: 'A2z'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-6@1.0/에이투지체-3Light.woff2') format('woff2'); font-weight: 300; font-display: swap; }
        @font-face { font-family: 'A2z'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-6@1.0/에이투지체-4Regular.woff2') format('woff2'); font-weight: 400; font-display: swap; }
        @font-face { font-family: 'A2z'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-6@1.0/에이투지체-5Medium.woff2') format('woff2'); font-weight: 500; font-display: swap; }
        @font-face { font-family: 'A2z'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-6@1.0/에이투지체-6SemiBold.woff2') format('woff2'); font-weight: 600; font-display: swap; }
        @font-face { font-family: 'A2z'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-6@1.0/에이투지체-7Bold.woff2') format('woff2'); font-weight: 700; font-display: swap; }
        @font-face { font-family: 'A2z'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-6@1.0/에이투지체-8ExtraBold.woff2') format('woff2'); font-weight: 800; font-display: swap; }
        @font-face { font-family: 'A2z'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-6@1.0/에이투지체-9Black.woff2') format('woff2'); font-weight: 900; font-display: swap; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'A2z', sans-serif; 
            font-weight: 400; 
            overflow: hidden;
            background-color: #2c3e50;
            color: white;
            user-select: none;
        }

        /* 가사 입력 화면 */
        #input-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        textarea {
            width: 80%;
            max-width: 600px;
            height: 300px;
            padding: 15px;
            font-size: 18px;
            border-radius: 10px;
            border: none;
            resize: none;
            margin-bottom: 20px;
            font-family: 'A2z', sans-serif;
            font-weight: 500;
        }

        button {
            padding: 15px 30px;
            font-size: 20px;
            font-family: 'A2z', sans-serif;
            font-weight: 700;
            color: white;
            background-color: #e74c3c;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* --------------------------------------
           노래방 화면 (2줄 교차)
           -------------------------------------- */
        #karaoke-screen {
            display: none; 
            width: 100vw;
            height: 100vh;
            background-color: #87CEEB; /* 하늘색 배경 */
            position: relative;
        }
        
        .lyrics-container {
            position: absolute;
            bottom: 10%;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .line-wrapper {
            margin-bottom: 20px; 
            height: 120px; 
            width: 95%; 
        }

        /* 윗줄은 왼쪽, 아랫줄은 오른쪽 엇갈린 배치 */
        #wrapper1 { text-align: left; padding-left: 50px; } 
        #wrapper2 { text-align: right; padding-right: 50px; } 

        .lyric-box {
            position: relative;
            display: inline-block; 
            font-size: 100px; 
            font-weight: 500; /* <-- 요청하신 폰트 굵기 500으로 수정됨 */
            letter-spacing: 5px; 
            
            /* 깔끔한 테두리 */
            text-shadow: 4px 4px 0 #000, -4px -4px 0 #000, 4px -4px 0 #000, -4px 4px 0 #000;
        }

        .text-base {
            color: white; 
        }

        .text-fill {
            position: absolute;
            top: 0;
            left: 0;
            color: #5DA4FF; 
            width: 0%; 
            overflow: hidden;
            white-space: nowrap;
        }
        
        .active-line {
            transform: scale(1.05);
            transition: transform 0.2s;
        }
    </style>
</head>
<body>

    <div id="input-screen">
        <h2 style="font-weight: 800;">🎤 가사를 넣어주세요</h2>
        <textarea id="lyrics-input">정의당 심상정 거침없는 대개혁
노동이 당당한 새로운 대한민국 우리의 선
택은 5번 심상정
그래 심상정이야 내 삶을 바꾸는
정치교체 선택해요 이번에 용기 내봐요
흔들리지 않는 우리 선택 확실한 심상정이야</textarea>
        <button id="start-btn">시작하기</button>
    </div>

    <div id="karaoke-screen">
        <div class="lyrics-container">
            <div class="line-wrapper" id="wrapper1">
                <div class="lyric-box" id="line1">
                    <div class="text-base"></div>
                    <div class="text-fill"></div>
                </div>
            </div>
            <div class="line-wrapper" id="wrapper2">
                <div class="lyric-box" id="line2">
                    <div class="text-base"></div>
                    <div class="text-fill"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let lyricsArray = [];
        let currentLyricIndex = 0;
        let activeLine = 1; 
        
        let isPressing = false;
        let currentSpeed = 0;
        let fillProgress = 0; 

        function setLineText(lineNum, text) {
            const base = document.querySelector(`#line${lineNum} .text-base`);
            const fill = document.querySelector(`#line${lineNum} .text-fill`);
            base.innerText = text;
            fill.innerText = text;
            fill.style.width = '0%'; 
        }

        document.getElementById('start-btn').addEventListener('click', function() {
            const rawText = document.getElementById('lyrics-input').value;
            lyricsArray = rawText.split('\n').filter(line => line.trim() !== "");

            if(lyricsArray.length === 0) return alert("가사를 입력해주세요!");

            document.getElementById('input-screen').style.display = 'none';
            document.getElementById('karaoke-screen').style.display = 'block';

            setLineText(1, lyricsArray[0] || "");
            setLineText(2, lyricsArray[1] || "");
            
            document.getElementById('line1').classList.add('active-line');
        });

        document.addEventListener('keydown', function(e) {
            if(e.repeat) return; 

            if (e.key === '1') { isPressing = true; currentSpeed = 0.2; } 
            else if (e.key === '2') { isPressing = true; currentSpeed = 0.4; } 
            else if (e.key === '3') { isPressing = true; currentSpeed = 0.7; } 
            
            else if (e.key === 'Enter') {
                if (currentLyricIndex >= lyricsArray.length) return;

                currentLyricIndex++;
                
                document.getElementById(`line${activeLine}`).classList.remove('active-line');
                
                const inactiveLine = activeLine; 
                activeLine = (activeLine === 1) ? 2 : 1; 
                
                document.getElementById(`line${activeLine}`).classList.add('active-line');
                fillProgress = 0; 

                let nextLyricToLoad = lyricsArray[currentLyricIndex + 1] || "";
                setLineText(inactiveLine, nextLyricToLoad);
            }
        });

        document.addEventListener('keyup', function(e) {
            if (['1', '2', '3'].includes(e.key)) {
                isPressing = false;
            }
        });

        function animateFill() {
            if (isPressing && fillProgress < 100) {
                fillProgress += currentSpeed;
                if (fillProgress > 100) fillProgress = 100;

                const activeFillElement = document.querySelector(`#line${activeLine} .text-fill`);
                if (activeFillElement) {
                    activeFillElement.style.width = fillProgress + '%';
                }
            }
            requestAnimationFrame(animateFill); 
        }
        
        requestAnimationFrame(animateFill);
    </script>
</body>
</html>
